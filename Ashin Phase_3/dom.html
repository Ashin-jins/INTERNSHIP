<!DOCTYPE html>
<html>
<head>
    <title>Simple DOM</title>
</head>
<body>

    <h1 id="title">Hello</h1>

    <input type="text" id="inp" placeholder="Enter text">
    <br><br>

    <button onclick="changeText()">Change Text</button>
    <button onclick="changeColor()">Change style</button>
    <button onclick="addText()">Add</button>
    <button onclick="removeText()">Remove</button>

    <div id="box"></div>

    <script>
        function changeText() {
            let val = document.getElementById("inp").value;
            document.getElementById("title").innerText = val;
        }

        function changeColor() {
            let colors = ["red", "blue", "green", "orange"];
            let random = Math.floor(Math.random() * colors.length);
            document.getElementById("title").style.color = colors[random];
        }

        function addText() {
            let val = document.getElementById("inp").value;

            let p = document.createElement("p");
            p.innerText = val;
            p.id = "new";

            document.getElementById("box").appendChild(p);
        }

        function removeText() {
            let el = document.getElementById("new");
            if (el) {
                el.remove();
            }
        }
    </script>

</body>
</html>
