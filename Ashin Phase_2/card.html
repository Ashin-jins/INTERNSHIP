<!DOCTYPE html>
<html>
<head>
  <title>Card</title>
</head>
 <style>
    .card {
      width: 200px;
      margin: 20px;        
      padding: 10px;      
      border: 1px solid rgb(12, 0, 5);
      text-align: center;
    }
    img {
      width: 100%;
    }
  </style>
<body>
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6a/JavaScript-logo.png">
    <h3>JavaScript</h3>
    <a href="https://en.wikipedia.org/wiki/JavaScript">Link</a>
  </div>
</body>
</html>
