<!DOCTYPE html>
<html>
<head>
    
    <title>Digital Library Access</title>
</head>
<body>

    <h1>Library Login</h1>

    <form>
        <fieldset style="width: 300px;">
            <legend><b>Login</b></legend>

            Username:<br>
            <input type="text"
                   placeholder="LIB-9988"
                   required
                   maxlength="10"
                   pattern="LIB-[0-9]{4}">
            <br><br>

            Password:<br>
            <input type="password"
                   required
                   minlength="4"
                   maxlength="12">
            <br><br>

            <input type="submit" value="Login">
            <input type="reset" value="Cancel">

        </fieldset>
    </form>

</body>
</html>
