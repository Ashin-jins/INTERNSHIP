<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

    <h2>Student Registration</h2><br><br>
     <h3>Student Portal: New User Registration</h3>
    <p>Complete the form below to create your campus account.</p>


    <form>
        Name:<br>
        <input type="text" required><br><br>

        parents name:<br>
        <input type="text" required
                placeholder="Father name"><br>
        <input type="text" required
                placeholder="Mother name"><br><br>

        Email:<br>
        <input type="email" required
                placeholder="eg:abcd@gmail.com"><br><br>

        Password:<br>
        <input type="password" required><br><br>

        Gender:<br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <input type="radio" name="gender"> Other<br><br>

        Hobbies:<br>
        <input type="checkbox"> Coding
        <input type="checkbox"> Gaming
        <input type="checkbox"> Reading
        <input type="checkbox"> Traveling<br><br>

        <button type="submit">Submit</button>
        <button type="reset">Clear</button>
    </form>

</body>
</html>
